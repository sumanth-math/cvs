name: Deploy Platform API

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  CONTAINER_PLATFORM: ${{ vars.CONTAINER_PLATFORM || 'linux/amd64' }}
  IMAGE_TAG: ${{ github.sha }}
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'platform-service/terraform.tfstate' }}
  TF_WORKING_DIR: deploy/terraform

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.event_name == 'workflow_dispatch' || vars.ENABLE_DEPLOY_ON_PUSH == 'true' }}
    env:
      AWS_GITHUB_ACTIONS_ROLE_ARN: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Normalize deployment inputs
        env:
          RAW_AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
          RAW_CONTAINER_PLATFORM: ${{ vars.CONTAINER_PLATFORM || 'linux/amd64' }}
          RAW_MANAGED_BUCKET_PREFIX: ${{ vars.MANAGED_BUCKET_PREFIX }}
          RAW_TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          RAW_TF_STATE_KEY: ${{ vars.TF_STATE_KEY || 'platform-service/terraform.tfstate' }}
          RAW_VPC_ID: ${{ vars.VPC_ID }}
        run: |
          set -euo pipefail

          trim_value() {
            printf '%s' "$1" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'
          }

          AWS_REGION="$(trim_value "${RAW_AWS_REGION}")"
          CONTAINER_PLATFORM="$(trim_value "${RAW_CONTAINER_PLATFORM}")"
          MANAGED_BUCKET_PREFIX="$(trim_value "${RAW_MANAGED_BUCKET_PREFIX}")"
          TF_STATE_BUCKET="$(trim_value "${RAW_TF_STATE_BUCKET}")"
          TF_STATE_KEY="$(trim_value "${RAW_TF_STATE_KEY}")"
          VPC_ID="$(trim_value "${RAW_VPC_ID}")"

          if [ -z "${AWS_REGION}" ]; then
            AWS_REGION="us-east-1"
          fi
          if [ -z "${CONTAINER_PLATFORM}" ]; then
            CONTAINER_PLATFORM="linux/amd64"
          fi
          if [ -z "${TF_STATE_KEY}" ]; then
            TF_STATE_KEY="platform-service/terraform.tfstate"
          fi

          if [ -z "${TF_STATE_BUCKET}" ]; then
            echo "::error::Missing required deployment setting: repository variable TF_STATE_BUCKET"
            exit 1
          fi

          if ! printf '%s' "${TF_STATE_BUCKET}" | grep -Eq '^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$'; then
            echo "::error::TF_STATE_BUCKET must be a valid S3 bucket name with no hidden whitespace."
            exit 1
          fi

          {
            echo "AWS_REGION=${AWS_REGION}"
            echo "CONTAINER_PLATFORM=${CONTAINER_PLATFORM}"
            echo "MANAGED_BUCKET_PREFIX=${MANAGED_BUCKET_PREFIX}"
            echo "TF_STATE_BUCKET=${TF_STATE_BUCKET}"
            echo "TF_STATE_KEY=${TF_STATE_KEY}"
            echo "VPC_ID=${VPC_ID}"
          } >> "$GITHUB_ENV"

          backend_config="${GITHUB_WORKSPACE}/${TF_WORKING_DIR}/backend.hcl"
          cat > "${backend_config}" <<EOF
          bucket = "${TF_STATE_BUCKET}"
          key    = "${TF_STATE_KEY}"
          region = "${AWS_REGION}"
          encrypt = true
          EOF

          echo "TF_BACKEND_CONFIG=${backend_config}" >> "$GITHUB_ENV"

      - name: Check deployment configuration
        env:
          ALB_SUBNET_IDS: ${{ vars.ALB_SUBNET_IDS }}
          PRIVATE_SUBNET_IDS: ${{ vars.PRIVATE_SUBNET_IDS }}
        run: |
          set -euo pipefail

          trim_value() {
            printf '%s' "$1" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'
          }

          ALB_SUBNET_IDS="$(trim_value "${ALB_SUBNET_IDS:-}")"
          PRIVATE_SUBNET_IDS="$(trim_value "${PRIVATE_SUBNET_IDS:-}")"

          if [ "$(printf '%s' "${ALB_SUBNET_IDS}" | tr -d '[:space:]')" = "[]" ]; then
            ALB_SUBNET_IDS=""
          fi
          if [ "$(printf '%s' "${PRIVATE_SUBNET_IDS}" | tr -d '[:space:]')" = "[]" ]; then
            PRIVATE_SUBNET_IDS=""
          fi

          missing=0
          require_value() {
            local name="$1"
            local value="$2"
            if [ -z "${value}" ]; then
              echo "::error::Missing required deployment setting: ${name}"
              missing=1
            fi
          }

          require_value "secret AWS_GITHUB_ACTIONS_ROLE_ARN" "${AWS_GITHUB_ACTIONS_ROLE_ARN}"
          require_value "repository variable TF_STATE_BUCKET" "${TF_STATE_BUCKET}"
          require_value "repository variable MANAGED_BUCKET_PREFIX" "${MANAGED_BUCKET_PREFIX}"

          if [ -z "${VPC_ID}" ] && [ -z "${ALB_SUBNET_IDS}" ] && [ -z "${PRIVATE_SUBNET_IDS}" ]; then
            echo "No VPC/subnet variables were provided; Terraform will create a demo VPC with two public subnets."
          fi

          if [ -n "${VPC_ID}" ] || [ -n "${ALB_SUBNET_IDS}" ] || [ -n "${PRIVATE_SUBNET_IDS}" ]; then
            require_value "repository variable VPC_ID, or leave all VPC/subnet variables empty" "${VPC_ID}"
            require_value "repository variable ALB_SUBNET_IDS, or leave all VPC/subnet variables empty" "${ALB_SUBNET_IDS}"
            require_value "repository variable PRIVATE_SUBNET_IDS, or leave all VPC/subnet variables empty" "${PRIVATE_SUBNET_IDS}"
          fi

          if [ "${missing}" -ne 0 ]; then
            echo "Set the missing GitHub secret/variables, then rerun this workflow."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Render Terraform variables
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          ALB_SUBNET_IDS: ${{ vars.ALB_SUBNET_IDS }}
          ALLOWED_INGRESS_CIDR_BLOCKS: ${{ vars.ALLOWED_INGRESS_CIDR_BLOCKS }}
          ALLOWED_KMS_KEY_ARNS: ${{ vars.ALLOWED_KMS_KEY_ARNS }}
          CREATE_GITHUB_OIDC_PROVIDER: ${{ vars.CREATE_GITHUB_OIDC_PROVIDER }}
          CPU_ARCHITECTURE: ${{ vars.CPU_ARCHITECTURE }}
          DEPLOY_BRANCH: ${{ vars.DEPLOY_BRANCH }}
          DESIRED_COUNT: ${{ vars.DESIRED_COUNT }}
          ENABLE_EXECUTE_COMMAND: ${{ vars.ENABLE_EXECUTE_COMMAND }}
          ENVIRONMENT: ${{ vars.ENVIRONMENT }}
          DEPLOYMENT_SUMMARY_TOPIC_ARN: ${{ vars.DEPLOYMENT_SUMMARY_TOPIC_ARN }}
          GITHUB_API_URL: ${{ vars.GITHUB_API_URL }}
          GITHUB_AUTO_LABELS: ${{ vars.GITHUB_AUTO_LABELS }}
          GITHUB_BRANCH_NAME_PATTERN: ${{ vars.GITHUB_BRANCH_NAME_PATTERN }}
          GITHUB_SECRET_KMS_KEY_ARNS: ${{ vars.GITHUB_SECRET_KMS_KEY_ARNS }}
          GITHUB_TOKEN_SECRET_ARN: ${{ vars.GITHUB_TOKEN_SECRET_ARN }}
          GITHUB_OIDC_PROVIDER_ARN: ${{ vars.GITHUB_OIDC_PROVIDER_ARN }}
          GITHUB_WEBHOOK_SECRET_ARN: ${{ vars.GITHUB_WEBHOOK_SECRET_ARN }}
          INTERNAL_ALB: ${{ vars.INTERNAL_ALB }}
          LOG_RETENTION_DAYS: ${{ vars.LOG_RETENTION_DAYS }}
          MANAGED_BUCKET_PREFIX: ${{ vars.MANAGED_BUCKET_PREFIX }}
          PRIVATE_SUBNET_IDS: ${{ vars.PRIVATE_SUBNET_IDS }}
          PROJECT_NAME: ${{ vars.PROJECT_NAME }}
          TAGS_JSON: ${{ vars.TAGS_JSON }}
          TASK_CPU: ${{ vars.TASK_CPU }}
          TASK_MEMORY: ${{ vars.TASK_MEMORY }}
          TERRAFORM_MANAGED_GITHUB_REPOSITORY: ${{ vars.TERRAFORM_MANAGED_GITHUB_REPOSITORY }}
          VPC_ID: ${{ vars.VPC_ID }}
        run: |
          set -euo pipefail

          : "${TF_STATE_BUCKET:?Set TF_STATE_BUCKET as a repository variable}"

          trim_value() {
            printf '%s' "$1" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'
          }

          MANAGED_BUCKET_PREFIX="$(trim_value "${MANAGED_BUCKET_PREFIX:-}")"
          DEPLOYMENT_SUMMARY_TOPIC_ARN="$(trim_value "${DEPLOYMENT_SUMMARY_TOPIC_ARN:-}")"
          GITHUB_API_URL="$(trim_value "${GITHUB_API_URL:-https://api.github.com}")"
          GITHUB_BRANCH_NAME_PATTERN="$(trim_value "${GITHUB_BRANCH_NAME_PATTERN:-}")"
          GITHUB_TOKEN_SECRET_ARN="$(trim_value "${GITHUB_TOKEN_SECRET_ARN:-}")"
          GITHUB_WEBHOOK_SECRET_ARN="$(trim_value "${GITHUB_WEBHOOK_SECRET_ARN:-}")"
          VPC_ID="$(trim_value "${VPC_ID:-}")"
          ALB_SUBNET_IDS="$(trim_value "${ALB_SUBNET_IDS:-}")"
          PRIVATE_SUBNET_IDS="$(trim_value "${PRIVATE_SUBNET_IDS:-}")"

          : "${MANAGED_BUCKET_PREFIX:?Set MANAGED_BUCKET_PREFIX as a repository variable}"

          if [ -z "${ALB_SUBNET_IDS}" ]; then
            ALB_SUBNET_IDS="[]"
          fi
          if [ -z "${PRIVATE_SUBNET_IDS}" ]; then
            PRIVATE_SUBNET_IDS="[]"
          fi

          jq -n \
            --arg project_name "${PROJECT_NAME:-platform-service}" \
            --arg environment "${ENVIRONMENT:-dev}" \
            --arg aws_region "${AWS_REGION}" \
            --arg vpc_id "${VPC_ID}" \
            --arg managed_bucket_prefix "${MANAGED_BUCKET_PREFIX}" \
            --arg image_tag "${IMAGE_TAG}" \
            --arg cpu_architecture "${CPU_ARCHITECTURE:-X86_64}" \
            --arg github_repository "${TERRAFORM_MANAGED_GITHUB_REPOSITORY:-}" \
            --arg github_branch "${DEPLOY_BRANCH:-main}" \
            --arg github_oidc_provider_arn "${GITHUB_OIDC_PROVIDER_ARN:-}" \
            --arg deployment_summary_topic_arn "${DEPLOYMENT_SUMMARY_TOPIC_ARN}" \
            --arg github_api_url "${GITHUB_API_URL:-https://api.github.com}" \
            --arg github_branch_name_pattern "${GITHUB_BRANCH_NAME_PATTERN:-^(feature|feat|fix|bugfix|hotfix|chore|docs|refactor|test|ci|build|release|dependabot)/[a-z0-9._-]+$}" \
            --arg github_token_secret_arn "${GITHUB_TOKEN_SECRET_ARN}" \
            --arg github_webhook_secret_arn "${GITHUB_WEBHOOK_SECRET_ARN}" \
            --argjson alb_subnet_ids "${ALB_SUBNET_IDS}" \
            --argjson private_subnet_ids "${PRIVATE_SUBNET_IDS}" \
            --argjson allowed_ingress_cidr_blocks "${ALLOWED_INGRESS_CIDR_BLOCKS:-[\"0.0.0.0/0\"]}" \
            --argjson internal_alb "${INTERNAL_ALB:-true}" \
            --argjson desired_count "${DESIRED_COUNT:-2}" \
            --argjson task_cpu "${TASK_CPU:-256}" \
            --argjson task_memory "${TASK_MEMORY:-512}" \
            --argjson log_retention_days "${LOG_RETENTION_DAYS:-30}" \
            --argjson enable_execute_command "${ENABLE_EXECUTE_COMMAND:-false}" \
            --argjson allowed_kms_key_arns "${ALLOWED_KMS_KEY_ARNS:-[]}" \
            --argjson create_github_oidc_provider "${CREATE_GITHUB_OIDC_PROVIDER:-false}" \
            --argjson github_auto_labels "${GITHUB_AUTO_LABELS:-true}" \
            --argjson github_secret_kms_key_arns "${GITHUB_SECRET_KMS_KEY_ARNS:-[]}" \
            --argjson tags "${TAGS_JSON:-{}}" \
            '{
              project_name: $project_name,
              environment: $environment,
              aws_region: $aws_region,
              vpc_id: $vpc_id,
              alb_subnet_ids: $alb_subnet_ids,
              private_subnet_ids: $private_subnet_ids,
              managed_bucket_prefix: $managed_bucket_prefix,
              image_tag: $image_tag,
              cpu_architecture: $cpu_architecture,
              allowed_ingress_cidr_blocks: $allowed_ingress_cidr_blocks,
              internal_alb: $internal_alb,
              desired_count: $desired_count,
              task_cpu: $task_cpu,
              task_memory: $task_memory,
              log_retention_days: $log_retention_days,
              enable_execute_command: $enable_execute_command,
              allowed_kms_key_arns: $allowed_kms_key_arns,
              deployment_summary_topic_arn: $deployment_summary_topic_arn,
              github_api_url: $github_api_url,
              github_auto_labels: $github_auto_labels,
              github_branch_name_pattern: $github_branch_name_pattern,
              github_token_secret_arn: $github_token_secret_arn,
              github_webhook_secret_arn: $github_webhook_secret_arn,
              github_secret_kms_key_arns: $github_secret_kms_key_arns,
              create_github_oidc_provider: $create_github_oidc_provider,
              github_repository: $github_repository,
              github_branch: $github_branch,
              github_oidc_provider_arn: $github_oidc_provider_arn,
              tags: $tags
            }' > github.auto.tfvars.json

          echo "ECR_REPOSITORY_NAME=${PROJECT_NAME:-platform-service}-${ENVIRONMENT:-dev}" >> "$GITHUB_ENV"

      - name: Ensure Terraform state bucket
        run: |
          set -euo pipefail

          if aws s3api head-bucket --bucket "${TF_STATE_BUCKET}" 2>/dev/null; then
            echo "Terraform state bucket exists: ${TF_STATE_BUCKET}"
          else
            echo "Creating Terraform state bucket: ${TF_STATE_BUCKET}"
            if [ "${AWS_REGION}" = "us-east-1" ]; then
              aws s3api create-bucket \
                --bucket "${TF_STATE_BUCKET}" \
                --region "${AWS_REGION}"
            else
              aws s3api create-bucket \
                --bucket "${TF_STATE_BUCKET}" \
                --region "${AWS_REGION}" \
                --create-bucket-configuration "LocationConstraint=${AWS_REGION}"
            fi
            aws s3api wait bucket-exists --bucket "${TF_STATE_BUCKET}"
          fi

          bucket_location="$(aws s3api get-bucket-location --bucket "${TF_STATE_BUCKET}" --query 'LocationConstraint' --output text)"
          if [ "${bucket_location}" = "None" ]; then
            bucket_location="us-east-1"
          fi
          if [ "${bucket_location}" != "${AWS_REGION}" ]; then
            echo "::error::Terraform state bucket ${TF_STATE_BUCKET} is in ${bucket_location}, but AWS_REGION is ${AWS_REGION}."
            exit 1
          fi

          aws s3api put-public-access-block \
            --bucket "${TF_STATE_BUCKET}" \
            --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

          aws s3api put-bucket-encryption \
            --bucket "${TF_STATE_BUCKET}" \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          aws s3api put-bucket-versioning \
            --bucket "${TF_STATE_BUCKET}" \
            --versioning-configuration Status=Enabled

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          test -s "${TF_BACKEND_CONFIG}"
          terraform init -backend-config="${TF_BACKEND_CONFIG}"

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Ensure ECR repository exists
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -target=aws_ecr_repository.service

      - name: Read ECR repository URL
        id: ecr
        run: |
          repository_url="$(aws ecr describe-repositories \
            --repository-names "${ECR_REPOSITORY_NAME}" \
            --query 'repositories[0].repositoryUri' \
            --output text)"
          echo "repository_url=${repository_url}" >> "$GITHUB_OUTPUT"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        run: |
          docker buildx build \
            --platform "${CONTAINER_PLATFORM}" \
            --tag "${{ steps.ecr.outputs.repository_url }}:${IMAGE_TAG}" \
            --push .

      - name: Deploy ECS service
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve
